services:
  - type: web
    name: interviewprep-ai-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: REQUIRE_AUTH
        value: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: REGISTRATION_OTP_REQUIRED
        value: true
      - key: EMAIL_OTP_DEV_MODE
        value: false
      - key: EMAIL_OTP_EXPIRE_MINUTES
        value: 10
      - key: EMAIL_OTP_RESEND_COOLDOWN_SECONDS
        value: 60
      - key: EMAIL_OTP_HOURLY_LIMIT
        value: 5
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        value: InterviewPrep AI <onboarding@resend.dev>
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: AUTH_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
